name: Trivy filesystem scan
description: >
  Run Trivy against the repository filesystem (vulnerabilities, misconfiguration,
  and secrets). Emits SARIF, uploads it to GitHub code scanning, and fails the
  job when findings at or above the configured severity exist.

inputs:
  severity:
    description: Comma-separated severities that should fail the build.
    required: false
    default: "CRITICAL,HIGH"
  scanners:
    description: Comma-separated Trivy scanners to enable.
    required: false
    default: "vuln,misconfig,secret"
  ignore-unfixed:
    description: Ignore vulnerabilities that have no fix available.
    required: false
    default: "true"
  upload-sarif:
    description: Upload the SARIF report to GitHub code scanning.
    required: false
    default: "true"
  sarif-category:
    description: Category used when uploading SARIF (lets multiple scans coexist).
    required: false
    default: "trivy-fs"

runs:
  using: composite
  steps:
    # Scan and write SARIF. Trivy itself never fails the step; the gate below
    # decides job status by inspecting the SARIF file (single source of truth).
    - name: Trivy filesystem scan
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        scan-type: fs
        scan-ref: .
        scanners: ${{ inputs.scanners }}
        severity: ${{ inputs.severity }}
        ignore-unfixed: ${{ inputs.ignore-unfixed }}
        format: sarif
        output: trivy-fs.sarif

    - name: Upload SARIF to GitHub code scanning
      # `continue-on-error: true` keeps PRs from forks green when the
      # GITHUB_TOKEN is read-only and cannot write security events.
      if: ${{ inputs.upload-sarif == 'true' }}
      continue-on-error: true
      uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
      with:
        sarif_file: trivy-fs.sarif
        category: ${{ inputs.sarif-category }}

    - name: Fail job on Trivy findings
      shell: bash
      run: |
        count=$(jq '[.runs[].results[]] | length' trivy-fs.sarif)
        if [ "$count" -gt 0 ]; then
          echo "::error::Trivy found ${count} finding(s) at severity ${{ inputs.severity }}. See the scan output above and the Security tab for details."
          exit 1
        fi
        echo "Trivy found no findings at severity ${{ inputs.severity }}."
