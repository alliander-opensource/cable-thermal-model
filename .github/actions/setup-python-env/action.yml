name: Setup Python environment
description: >
  Set up Python and uv, restore the virtualenv cache keyed on uv.lock,
  and install project dependencies. Assumes the repository is already checked out.

inputs:
  python-version:
    description: Python version to install (passed to actions/setup-python).
    required: false
    default: "3.12"
  uv-version:
    description: uv version to install.
    required: false
    default: "0.11.26"
  install-args:
    description: >
      Extra arguments forwarded to `uv sync`. Use this to select dependency
      groups or optional extras. Example: "--group dev --frozen".
    required: false
    default: "--group dev --frozen"
  cache-key-suffix:
    description: Optional suffix to scope the cache (e.g. job name).
    required: false
    default: ""

outputs:
  python-version:
    description: The resolved Python version that was installed.
    value: ${{ steps.setup-python.outputs.python-version }}
  venv-path:
    description: Absolute path to the uv-managed virtualenv.
    value: ${{ steps.venv.outputs.path }}

runs:
  using: composite
  steps:
    - name: Set up Python
      id: setup-python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install uv
      shell: bash
      run: |
        python -m pip install --upgrade "uv==${{ inputs.uv-version }}"
        uv --version

    - name: Restore virtualenv cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: .venv
        key: venv-${{ runner.os }}-py${{ inputs.python-version }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}-${{ inputs.cache-key-suffix }}
        restore-keys: |
          venv-${{ runner.os }}-py${{ inputs.python-version }}-

    - name: Install dependencies
      shell: bash
      run: uv sync ${{ inputs.install-args }}

    - name: Resolve venv path
      id: venv
      shell: bash
      run: echo "path=$(uv run python -c 'import sys; print(sys.prefix)')" >> "$GITHUB_OUTPUT"
