name: Setup Python environment
description: >
  Set up Python and Poetry, restore the virtualenv cache keyed on poetry.lock,
  and install project dependencies. Assumes the repository is already checked out.

inputs:
  python-version:
    description: Python version to install (passed to actions/setup-python).
    required: false
    default: "3.12"
  poetry-version:
    description: Poetry version to install.
    required: false
    default: "2.4.1"
  install-args:
    description: >
      Extra arguments forwarded to `poetry install`. Use this to select groups,
      extras, or `--no-root`. Example: "--with dev,test --no-interaction".
    required: false
    default: "--with dev --no-interaction"
  cache-key-suffix:
    description: Optional suffix to scope the cache (e.g. job name).
    required: false
    default: ""

outputs:
  python-version:
    description: The resolved Python version that was installed.
    value: ${{ steps.setup-python.outputs.python-version }}
  venv-path:
    description: Absolute path to the Poetry-managed virtualenv.
    value: ${{ steps.venv.outputs.path }}

runs:
  using: composite
  steps:
    - name: Set up Python
      id: setup-python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Poetry
      shell: bash
      run: |
        pipx install "poetry==${{ inputs.poetry-version }}"
        poetry --version

    - name: Configure Poetry (in-project virtualenv)
      shell: bash
      run: |
        poetry config virtualenvs.in-project true
        poetry config virtualenvs.create true

    - name: Restore virtualenv cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: .venv
        key: venv-${{ runner.os }}-py${{ inputs.python-version }}-${{ hashFiles('poetry.lock', 'pyproject.toml') }}-${{ inputs.cache-key-suffix }}
        restore-keys: |
          venv-${{ runner.os }}-py${{ inputs.python-version }}-

    - name: Install dependencies
      shell: bash
      run: poetry install ${{ inputs.install-args }}

    - name: Resolve venv path
      id: venv
      shell: bash
      run: echo "path=$(poetry env info --path)" >> "$GITHUB_OUTPUT"
