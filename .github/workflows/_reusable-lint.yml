name: Lint (reusable)

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to lint against.
        required: false
        type: string
        default: "3.12"
      uv-version:
        description: uv version to install.
        required: false
        type: string
        default: "0.11.26"

permissions:
  contents: read

jobs:
  lint:
    name: ruff + mypy
    runs-on:
      group: managed
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python and uv
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ inputs.python-version }}
          uv-version: ${{ inputs.uv-version }}
          install-args: "--group dev --frozen"
          cache-key-suffix: lint

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy .
