name: Test (reusable)

on:
  workflow_call:
    inputs:
      python-versions:
        description: JSON array of Python versions for the matrix.
        required: false
        type: string
        default: '["3.11","3.12","3.13"]'
      uv-version:
        description: uv version to install.
        required: false
        type: string
        default: "0.11.26"
      coverage:
        description: Collect and upload coverage as an artifact.
        required: false
        type: boolean
        default: true
    secrets:
      SONAR_TOKEN:
        description: Token used to authenticate SonarQube/SonarCloud analysis.
        required: true

permissions:
  contents: read

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    # Non-blocking until the first tests land. Flip to false once tests/ exists.
    continue-on-error: true
    runs-on:
      group: managed
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python and uv
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}
          uv-version: ${{ inputs.uv-version }}
          install-args: "--group dev --frozen"
          cache-key-suffix: test-py${{ matrix.python-version }}

      - name: Pytest
        run: |
          if [ "${{ inputs.coverage }}" = "true" ]; then
            uv run pytest --cov --cov-report=xml --cov-report=term
          else
            uv run pytest
          fi

      - name: Upload coverage artifact
        if: ${{ inputs.coverage && always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-py${{ matrix.python-version }}
          path: ./coverage.xml
          if-no-files-found: ignore

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e #v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
