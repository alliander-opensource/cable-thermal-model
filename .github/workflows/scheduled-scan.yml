name: Scheduled security scan

on:
  schedule:
    # Mondays at 06:00 UTC: catch newly disclosed CVEs in unchanged code.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  security:
    name: Security
    uses: ./.github/workflows/_reusable-security.yml
    with:
      severity: "CRITICAL,HIGH"
