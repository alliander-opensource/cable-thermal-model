name: Security (reusable)

on:
  workflow_call:
    inputs:
      severity:
        description: Severities that should fail the build.
        required: false
        type: string
        default: "CRITICAL,HIGH"
      scanners:
        description: Comma-separated Trivy scanners to enable.
        required: false
        type: string
        default: "vuln,misconfig,secret"
      ignore-unfixed:
        description: Ignore vulnerabilities that have no fix available.
        required: false
        type: boolean
        default: true
      upload-sarif:
        description: Upload the SARIF report to GitHub code scanning.
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  fs-scan:
    name: Trivy filesystem
    runs-on:
      group: managed
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Trivy filesystem scan
        uses: ./.github/actions/trivy-fs-scan
        with:
          severity: ${{ inputs.severity }}
          scanners: ${{ inputs.scanners }}
          ignore-unfixed: ${{ inputs.ignore-unfixed }}
          upload-sarif: ${{ inputs.upload-sarif }}
